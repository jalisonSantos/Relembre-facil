<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relembre Fácil</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- Seu CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-light">

    <!-- HEADER -->
    <header class="bg-primary text-white p-3 d-flex justify-content-between align-items-center">
        <h1 class="h4 m-0">Relembre Fácil</h1>
        <button class="btn btn-light" data-bs-toggle="modal" data-bs-target="#modalTarefa">
            + Nova Tarefa
        </button>
    </header>

    <!-- MODAL (Bootstrap) -->
    <div class="modal fade" id="modalTarefa" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Nova Tarefa</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="text" id="titulo" class="form-control mb-2" placeholder="Título">
                    <input type="date" id="data" class="form-control mb-2">
                    <input type="time" id="hora" class="form-control mb-2">
                    <textarea id="descricao" class="form-control" placeholder="Descrição"></textarea>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-success" onclick="salvarTarefa()">Salvar</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                </div>

            </div>
        </div>
    </div>

    <!-- LISTA -->
    <main class="container mt-4">
        <ul id="listaTarefas" class="list-group"></ul>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <!-- Seu JS -->
    <script src="../js/script.js"></script>

</body>
</html>
